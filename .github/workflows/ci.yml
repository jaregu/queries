name: CI

on:
  push:
    branches-ignore:
      - master    # snapshot.yml handles master pushes (and runs tests as part of build)
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '17', '21' ]
    name: test (Java ${{ matrix.java }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Reckon needs full git history + tags to compute the version.
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build + test
        run: ./gradlew build -PjavaVersion=${{ matrix.java }} --stacktrace
